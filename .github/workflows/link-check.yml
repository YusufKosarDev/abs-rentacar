name: Link Sağlık Taraması

on:
  schedule:
    # Her pazartesi 06:00 UTC (09:00 TSİ)
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Canlı siteyi tara
        run: node scripts/check-links.mjs
