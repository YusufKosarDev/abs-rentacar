name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          # Yerel geliştirme ortamıyla aynı sürüm (npm 11 kilit çözümlemesi)
          node-version: 24
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Birim testler
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Playwright tarayıcısını kur
        run: npx playwright install --with-deps chromium

      - name: E2E + erişilebilirlik testleri
        run: npx playwright test

      - name: Hata durumunda raporu yükle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-sonuclari
          path: test-results/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse denetimi
        run: npx --yes @lhci/cli autorun
