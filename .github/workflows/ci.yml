name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Yerel geliştirme ortamıyla aynı sürüm (npm 11 kilit çözümlemesi)
          node-version: 24
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Birim testler
        run: npm test

      - name: Build
        run: npm run build
